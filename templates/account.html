{% extends "layout.html" %}
{% block content %}

<style>
/* Profile Card */
.profile-card {
    background: #fff;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.1);
}

/* Profile Image */
.account-img {
    height: 120px;
    width: 120px;
    object-fit: cover;
    border: 4px solid #4e73df;
}

/* Heading */
.account-heading {
    font-weight: 700;
}

/* Form Styling */
.form-control {
    border-radius: 10px;
}

/* Button */
.btn-custom {
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    border: none;
    color: white;
}
.btn-custom:hover {
    opacity: 0.9;
}

/* Section spacing */
.section-title {
    font-weight: 600;
    margin-bottom: 20px;
}
</style>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <!-- 👤 Profile Card -->
            <div class="profile-card text-center">

                <img class="rounded-circle account-img mb-3" src="{{ image_file }}">

                <h2 class="account-heading">{{ current_user.username }}</h2>
                <p class="text-muted">{{ current_user.email }}</p>

                <hr>

                <!-- ✏️ Update Profile Form -->
                <h5 class="section-title">Update Profile</h5>

                <form method="POST" action="" enctype="multipart/form-data">
                    {{ form.hidden_tag() }}

                    <div class="form-group mb-3 text-start">
                        <label>Username</label>
                        {{ form.username(class="form-control") }}
                    </div>

                    <div class="form-group mb-3 text-start">
                        <label>Email</label>
                        {{ form.email(class="form-control") }}
                    </div>

                    <div class="form-group mb-3 text-start">
                        <label>Profile Picture</label>
                        {{ form.picture(class="form-control") }}
                    </div>

                    <button class="btn btn-custom w-100 mt-3">
                        Update Profile
                    </button>
                </form>

            </div>

        </div>
    </div>

</div>

{% endblock content %}
