{% extends "layout.html" %}
{% block content %}
    <div class="container">
        <h1 class="text-center my-4">All Courses</h1>
        <div class="row">
            {% for course in courses %}
                <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        <img src="{{ course.image_file }}" class="card-img-top" alt="{{ course.title }}">
                        <div class="card-body">
                            <h5 class="card-title"><a href="{{ url_for('courses.course', course_id=course.id) }}">{{ course.title }}</a></h5>
                            <p class="card-text">{{ course.description }}</p>
                        </div>
                        <div class="card-footer">
                            <p class="card-text">Price: ${{ course.price }}</p>
                            <a href="{{ url_for('courses.course', course_id=course.id) }}" class="btn btn-primary">View Course</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% endblock content %}
